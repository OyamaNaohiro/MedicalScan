workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.oyama.scanapp
      vars:
        XCODE_WORKSPACE: "ios/MedicalScan.xcworkspace"
        XCODE_SCHEME: "MedicalScan"
      node: v22
      xcode: 16.2
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true