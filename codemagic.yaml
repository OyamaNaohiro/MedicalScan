workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.oyama.stlscan
      vars:
        XCODE_WORKSPACE: "ios/MedicalScan.xcworkspace"
        XCODE_SCHEME: "MedicalScan"
      node: v22
      xcode: 16.2
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Patch RCTTurboModule for iOS 26
        script: |
          python3 - << 'PYEOF'
          import sys
          path = 'node_modules/react-native/ReactCommon/react/nativemodule/core/platform/ios/ReactCommon/RCTTurboModule.mm'
          with open(path, 'r') as f:
              content = f.read()
          # Suppress C++ throw inside async void method invocation block.
          # On iOS 26, [inv invokeWithTarget:] can throw an ObjC exception;
          # re-throwing it as C++ inside an async block causes std::terminate -> abort.
          old = 'throw convertNSExceptionToJSError(runtime, exception, std::string{moduleName}, methodNameStr);'
          new = 'NSLog(@"[iOS26Patch] Suppressed ObjC exception in void TurboModule method: %@", exception); return;'
          if old in content:
              content = content.replace(old, new)
              with open(path, 'w') as f:
                  f.write(content)
              print('iOS 26 RCTTurboModule patch applied successfully')
          else:
              print('WARNING: Patch target not found in RCTTurboModule.mm - may be already patched or version mismatch')
              sys.exit(0)
          PYEOF
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true